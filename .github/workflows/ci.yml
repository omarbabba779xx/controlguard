name: controlguard-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate built-in profile
        run: python -m controlguard validate --profile windows-workstation
      - name: Validate Graph MFA profile
        run: python -m controlguard validate --profile entra-admin-mfa
      - name: Validate Okta MFA profile
        run: python -m controlguard validate --profile okta-admin-mfa
      - name: Validate Linux server profile
        run: python -m controlguard validate --profile linux-server
