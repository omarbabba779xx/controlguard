name: controlguard-ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package with dev dependencies
        run: python -m pip install -e .[dev]
      - name: Compile sources
        run: python -m compileall controlguard tests
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
      - name: Mypy
        run: mypy
      - name: Bandit
        run: bandit -c pyproject.toml -r controlguard
      - name: Coverage
        run: |
          coverage run -m unittest discover -s tests -v
          coverage report

  package-check:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Compile sources
        run: python -m compileall controlguard tests

  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  profile-validation:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e .
      - name: Validate built-in profile
        run: python -m controlguard validate --profile windows-workstation
      - name: Validate Graph MFA profile
        run: python -m controlguard validate --profile entra-admin-mfa
      - name: Validate Okta MFA profile
        run: python -m controlguard validate --profile okta-admin-mfa
      - name: Validate Linux server profile
        run: python -m controlguard validate --profile linux-server
