name: Feature request
description: Propose a new capability, report enhancement, or product improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem being solved
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Audit value, compliance value, UX value, or operational value
